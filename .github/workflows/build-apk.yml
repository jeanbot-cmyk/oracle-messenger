name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Create assets directory (required by cap sync)
        run: mkdir -p frontend/android/app/src/main/assets

      - name: Capacitor sync
        working-directory: frontend
        run: npx cap sync android

      - name: Make gradlew executable
        working-directory: frontend/android
        run: chmod +x gradlew

      - name: Build APK debug
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      # Copier l'APK dans public/ pour qu'il soit servi par le frontend
      - name: Copy APK to frontend public folder
        run: cp frontend/android/app/build/outputs/apk/debug/app-debug.apk frontend/public/oracle-messenger.apk

      - name: Commit APK to repo (sera déployé par Coolify)
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add frontend/public/oracle-messenger.apk
          git diff --staged --quiet || git commit -m "chore: update APK build ${{ github.run_number }} [skip ci]"
          git push

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oracle-messenger-apk
          path: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Oracle Messenger APK — Build ${{ github.run_number }}"
          body: |
            ## Oracle Messenger — APK Android

            ### Téléchargement direct
            https://messenger.oracle-plus.online/oracle-messenger.apk

            ### Installation
            1. Télécharge l'APK via le lien ci-dessus
            2. Android : Paramètres → Sécurité → Autoriser sources inconnues
            3. Ouvre le fichier et installe
          files: frontend/android/app/build/outputs/apk/debug/app-debug.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
