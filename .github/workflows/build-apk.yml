name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Capacitor add + sync Android
        working-directory: frontend
        run: |
          npx cap add android 2>/dev/null || true
          npx cap sync android

      - name: Build APK (debug)
        working-directory: frontend/android
        run: ./gradlew assembleDebug --no-daemon

      - name: Rename and move APK
        run: |
          DATE=$(date +%Y%m%d-%H%M)
          mkdir -p dist
          cp frontend/android/app/build/outputs/apk/debug/app-debug.apk dist/oracle-messenger-${DATE}.apk
          echo "APK_FILE=dist/oracle-messenger-${DATE}.apk" >> $GITHUB_ENV
          echo "APK_NAME=oracle-messenger-${DATE}.apk" >> $GITHUB_ENV

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: oracle-messenger-apk
          path: ${{ env.APK_FILE }}
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: "Oracle Messenger APK — Build ${{ github.run_number }}"
          body: |
            ## Oracle Messenger — APK Android

            ### Installation
            1. Télécharge le fichier `.apk` ci-dessous
            2. Android : Paramètres → Sécurité → Autoriser sources inconnues
            3. Ouvre le fichier et installe
            4. Lance Oracle Messenger depuis ton écran d'accueil
          files: ${{ env.APK_FILE }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
